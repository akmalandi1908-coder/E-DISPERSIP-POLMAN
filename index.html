<!DOCTYPE html>
<html>
<head>
    <title>E-DISPERSIP Polman</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        header {
            background-color: #0d47a1;
            color: white;
            padding: 15px;
            text-align: center;
        }

        header h1 {
            margin: 5px;
            font-size: 22px;
        }

        header p {
            margin: 0;
            font-size: 14px;
        }

        .container {
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.3s;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .book-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .book-info {
            padding: 15px;
            text-align: center;
        }

        .book-info h3 {
            font-size: 16px;
            margin: 10px 0;
        }

        .book-info a {
            display: inline-block;
            padding: 8px 12px;
            background-color: #1565c0;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .book-info a:hover {
            background-color: #0d47a1;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #eee;
            font-size: 13px;
        }
    </style>
</head>

<body>

<header>
    <h1>E-DISPERSIP</h1>
    <p>Dinas Perpustakaan dan Kearsipan Kabupaten Polewali Mandar</p>
</header>

<div class="container">
    <div class="grid">

        <!-- BUKU 1 -->
        <div class="book-card">
            <img src="https://xhdptjuuiqulesyspoiw.supabase.co/storage/v1/object/public/ebooks/vivi.jpg">
            <div class="book-info">
                <h3>MOTIVASI DIRIMU</h3>
                <a href="https://xhdptjuuiqulesyspoiw.supabase.co/storage/v1/object/public/ebooks/771-Article%20Text-1339-1-10-20220201.pdf" target="_blank">Baca Buku</a>
            </div>
        </div>

        <!-- BUKU 2 -->
        <div class="book-card">
            <img src="https://xhdptjuuiqulesyspoiw.supabase.co/storage/v1/object/public/ebooks/cinta.jpg">
            <div class="book-info">
                <h3>CINTA YANG TAK BIASA</h3>
                <a href="https://xhdptjuuiqulesyspoiw.supabase.co/storage/v1/object/public/ebooks/UU%20Nomor%2043%20Tahun%202007.pdf" target="_blank">Baca Buku</a>
            </div>
        </div>

    </div>
</div>

<footer>
    © 2026 E-DISPERSIP | Versi Uji Coba Digital
</footer>

</body>
</html>
